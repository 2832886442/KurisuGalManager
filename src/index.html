<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galgame 管理器</title>
  <script type="module" src="/main.js" defer></script>
</head>

<body>
  <!-- ===== 应用容器 ===== -->
  <div id="app" class="app">

    <!-- ===== 侧边栏 ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16v16H4z" />
            <path d="M8 8h8v8H8z" />
            <path d="M12 4v16" />
            <path d="M4 12h16" />
          </svg>
        </div>
        <span class="brand-name">Galgame</span>
        <span class="brand-badge">管理器</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">分类</div>
          <ul class="nav-list" id="category-list">
            <li class="nav-item active" data-category="all">
              <span class="nav-icon">📚</span>
              <span class="nav-label">全部游戏</span>
              <span class="nav-count" id="count-all">0</span>
            </li>
          </ul>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">标签</div>
          <div class="tag-cloud" id="tag-cloud"></div>
        </div>

        <div class="nav-section nav-actions">
          <button class="nav-action-btn" id="btn-add-game" title="添加游戏">
            <span>＋</span> 添加游戏
          </button>
          <button class="nav-action-btn" id="btn-settings" title="设置">
            <span>⚙</span> 设置
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span class="status-text">本地运行</span>
        <button class="theme-toggle" id="theme-toggle" title="切换主题">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </aside>

    <!-- ===== 主内容区 ===== -->
    <main class="main-content">
      <header class="toolbar">
        <div class="toolbar-left">
          <h2 class="page-title" id="page-title">全部游戏</h2>
          <span class="game-count" id="game-count">0 款</span>
        </div>
        <div class="toolbar-right">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜索游戏名称..." />
          </div>
          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="网格视图">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
            </button>
            <button class="view-btn" data-view="list" title="列表视图">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="6" x2="20" y2="6" />
                <line x1="4" y1="12" x2="20" y2="12" />
                <line x1="4" y1="18" x2="20" y2="18" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section class="game-grid" id="game-grid"></section>

      <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">🎮</div>
        <h3>还没有游戏</h3>
        <p>点击「添加游戏」开始管理你的 Galgame 收藏</p>
        <button class="btn-primary" id="btn-empty-add">添加游戏</button>
      </div>
    </main>
  </div>

  <!-- ===== 详情弹窗 ===== -->
  <div class="modal-overlay" id="detail-overlay">
    <div class="modal-content" id="detail-modal">
      <button class="modal-close" id="detail-close">✕</button>
      <div class="detail-container" id="detail-container"></div>
    </div>
  </div>

  <!-- ===== 添加游戏弹窗 ===== -->
  <div class="modal-overlay" id="add-overlay">
    <div class="modal-content add-modal">
      <button class="modal-close" id="add-close">✕</button>
      <h3 class="add-title">添加新游戏</h3>
      <form id="add-form" autocomplete="off">
        <div class="form-group">
          <label>游戏名称 *</label>
          <input type="text" id="add-name" placeholder="输入游戏名称" required />
        </div>
        <div class="form-group">
          <label>游戏别名</label>
          <input type="text" id="add-alias" placeholder="别名（可选）" />
        </div>
        <div class="form-group">
          <label>启动程序路径 *</label>
          <div class="path-input">
            <input type="text" id="add-path" placeholder="选择 .exe 文件路径" required />
            <button type="button" class="btn-browse" id="add-browse">浏览</button>
          </div>
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="add-category">
            <option value="未分类">未分类</option>
          </select>
        </div>
        <div class="form-group">
          <label>标签（逗号分隔）</label>
          <input type="text" id="add-tags" placeholder="例如：纯爱, 汉化, 短篇" />
        </div>
        <div class="form-group">
          <label>游玩状态</label>
          <select id="add-status">
            <option value="未游玩">未游玩</option>
            <option value="游玩中">游玩中</option>
            <option value="已通关">已通关</option>
            <option value="搁置">搁置</option>
          </select>
        </div>
        <div class="form-group">
          <label>封面图（可选）</label>
          <div class="cover-upload">
            <input type="text" id="add-cover" placeholder="图片路径或留空" />
            <button type="button" class="btn-browse" id="add-cover-browse">选择</button>
          </div>
        </div>
        <div class="form-group">
          <label>简介</label>
          <textarea id="add-desc" rows="3" placeholder="输入游戏简介..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="add-cancel">取消</button>
          <button type="submit" class="btn-primary">确认添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 设置弹窗 ===== -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal-content settings-modal">
      <button class="modal-close" id="settings-close">✕</button>
      <h3 class="settings-title">⚙️ 设置</h3>

      <div class="settings-section">
        <h4>🎨 外观</h4>
        <div class="setting-row">
          <label>主题</label>
          <div class="setting-options">
            <button class="opt-btn" data-theme="light">☀️ 亮色</button>
            <button class="opt-btn" data-theme="dark">🌙 暗色</button>
            <button class="opt-btn active" data-theme="system">💻 跟随系统</button>
          </div>
        </div>
        <div class="setting-row">
          <label>窗口圆角</label>
          <input type="range" min="0" max="20" value="14" id="radius-slider" />
          <span id="radius-value">14px</span>
        </div>
        <div class="setting-row">
          <label>界面缩放</label>
          <select id="zoom-select">
            <option value="0.9">90%</option>
            <option value="1.0" selected>100%</option>
            <option value="1.1">110%</option>
            <option value="1.2">120%</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h4>💾 数据管理</h4>
        <div class="setting-row">
          <button class="btn-secondary" id="btn-backup">📤 备份数据</button>
          <button class="btn-secondary" id="btn-restore">📥 恢复数据</button>
        </div>
        <div class="setting-row">
          <button class="btn-danger" id="btn-cleanup">🧹 清理无效数据</button>
          <span class="hint">扫描失效路径、空分类</span>
        </div>
      </div>

      <div class="settings-section">
        <h4>🚀 启动选项</h4>
        <div class="setting-row">
          <label>开机自启</label>
          <label class="switch">
            <input type="checkbox" id="startup-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <label>关闭窗口时</label>
          <select id="close-action">
            <option value="exit">退出程序</option>
            <option value="tray" selected>最小化到托盘</option>
          </select>
        </div>
        <div class="setting-row">
          <label>默认启动视图</label>
          <select id="default-view">
            <option value="grid" selected>网格视图</option>
            <option value="list">列表视图</option>
          </select>
        </div>
      </div>

      <div class="settings-footer">
        <button class="btn-primary" id="settings-save">保存设置</button>
        <button class="btn-cancel" id="settings-cancel">取消</button>
      </div>
    </div>
  </div>
</body>

</html>
